<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/css/tufte.css' | relative_url }}">
  {% if site.mathjax %}
  <script>
    MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']] }, svg: { fontCache: 'global' } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
  {% endif %}
</head>
<body>
  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="site-badge">AB</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>About</a>
      <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>blog</a>
    </nav>
  </header>

  {{ content }}

  <footer>
    <hr>
    <p>&copy; {{ 'now' | date: "%Y" }} &nbsp; AHMED BOUGHDIRI &nbsp;·&nbsp; <a href="https://github.com/clayh53/tufte-jekyll">Tufte theme</a> &nbsp;·&nbsp; <a href="https://jekyllrb.com">Jekyll</a></p>
  </footer>
</body>
</html>
