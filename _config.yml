title: Ahmed Boughdiri
description: PhD Student in Causal Inference at INRIA
baseurl: ""
url: "https://boughdiriahmed.github.io"

author:
  name: Ahmed Boughdiri
  email: ""
  github: BoughdiriAhmed
  location: Montpellier/Paris, France

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/

kramdown:
  input: GFM
  math_engine: mathjax

# Plugins (requires local build + GitHub Actions — see MIGRATION_GUIDE.md)
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Site options
mathjax: true
lato_font_load: true

# Collections (for blog posts only now)
collections:
  posts:
    output: true

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
